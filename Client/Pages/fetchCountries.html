<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sync Countries to DB</title>
    <script src="https://code.jquery.com/jquery-4.0.0.min.js" integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>
    <script src="../JS/ajaxCalls.js"></script>
</head>
<body>

    <h2>Country Database Sync (Paginated)</h2>
    <button id="sync-btn">Fetch and Insert All Countries</button>

    <div id="status" style="margin-top: 20px; font-family: sans-serif; line-height: 1.5;"></div>

    <script>
        document.getElementById('sync-btn').addEventListener('click', startSync);

        async function startSync() {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = "Starting sync process...<br>";

            let successCount = 0;
            let failCount = 0;
            let totalProcessed = 0;

            // Pagination Settings
            const limit = 25;
            let offset = 0;
            let keepFetching = true;

            try {
                while (keepFetching) {
                    statusDiv.innerHTML = `Fetching records ${offset + 1} to ${offset + limit} from RestCountries API...<br>` +
                        `Successfully Saved: <span style="color:green">${successCount}</span><br>` +
                        `Failed: <span style="color:red">${failCount}</span>`;

                    const response = await fetch(
                        `https://api.restcountries.com/countries/v5?limit=${limit}&offset=${offset}`,
                        { headers: { 'Authorization': 'Bearer rc_live_4c479e0c5df6437f8018817bbbe7afa3' } }
                    );

                    if (!response.ok) throw new Error(`Failed to fetch from restcountries.com at offset ${offset}`);

                    const resultEnvelope = await response.json();
                    const restCountries = resultEnvelope.data?.objects || [];

                    // If the current page returns no objects, we've hit the end
                    if (restCountries.length === 0) {
                        keepFetching = false;
                        break;
                    }

                    // Loop through each country in the current page batch
                    for (let i = 0; i < restCountries.length; i++) {
                        const rc = restCountries[i];
                        if (!rc) continue;

                        const formattedCountry = {
                            id: 0,
                            cca3: rc.codes?.alpha_3 || "",
                            commonName: rc.names?.common || "",
                            officialName: rc.names?.official || "",
                            region: mapRegionToId(rc.region),
                            subregion: rc.subregion || "",
                            latitude: rc.coordinates?.lat || 0,
                            longitude: rc.coordinates?.lng || 0,
                            areaKm2: rc.area?.kilometers || 0,
                            isLandlocked: rc.landlocked || false,
                            population: rc.population || 0,
                            flagUrl: rc.flag?.url_png || "",
                            wikipediaUrl: rc.links?.wikipedia || "",

                            capitals: (rc.capitals || []).map(cap => ({
                                id: 0,
                                countryId: 0,
                                name: cap.name || "",
                                latitude: cap.coordinates?.lat || 0,
                                longitude: cap.coordinates?.lng || 0
                            })),

                            languages: (rc.languages || []).map(lang => ({
                                id: 0,
                                iso639_1: lang.iso639_1 || "",
                                languageName: lang.name || ""
                            })),

                            currencies: (rc.currencies || []).map(curr => ({
                                id: 0,
                                currencyCode: curr.code || "",
                                currencyName: curr.name || "",
                                currencySymbol: curr.symbol || ""
                            })),

                            borders: (rc.borders || []).map(borderCca3 => ({
                                cca3: borderCca3
                            })),

                            timezones: rc.timezones || []
                        };

                        // Promise-wrapped ajaxCall logic
                        await new Promise((resolve) => {
                            ajaxCall(
                                "POST",
                                "https://localhost:7255/api/Country",
                                JSON.stringify(formattedCountry),
                                (isSaved) => {
                                    if (isSaved === true) successCount++;
                                    else { failCount++; console.error(`Backend failed on ${formattedCountry.commonName}`); }
                                    resolve();
                                },
                                (err) => {
                                    failCount++;
                                    console.error(`Error sending ${formattedCountry.commonName}:`, err);
                                    resolve();
                                }
                            );
                        });

                        totalProcessed++;

                        // Dynamically update UI status per item processed
                        statusDiv.innerHTML = `Processing batch (Offset: ${offset})... <br>` +
                            `Total Records Handled: ${totalProcessed}<br>` +
                            `Successfully Saved: <span style="color:green">${successCount}</span><br>` +
                            `Failed: <span style="color:red">${failCount}</span>`;
                    }

                    // Move to the next page slice
                    offset += limit;
                }

                statusDiv.innerHTML += "<br><br><strong style='color:blue'>Sync Process Complete! All pages parsed.</strong>";

            } catch (error) {
                statusDiv.innerHTML += `<br><br><span style="color:red"><strong>Error:</strong> ${error.message}</span>`;
            }
        }

        // Helper function to turn textual regions into required integers
        function mapRegionToId(regionName) {
            if (!regionName) return 0;
            switch (regionName.toLowerCase()) {
                case 'africa': return 1;
                case 'americas': return 2;
                case 'antarctic': return 3;
                case 'asia': return 4;
                case 'europe': return 5;
                case 'oceania': return 6;
                default: return 0;
            }
        }
    </script>
</body>
</html>
